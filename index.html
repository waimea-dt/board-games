<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Board Games</title>
    <link rel="icon" type="image/svg+xml" href="images/dice.svg">

    <script src="js/games.js"></script>

    <link rel="stylesheet" href="css/pico.fluid.classless.jade.min.css">
    <link rel="stylesheet" href="css/pico.colors.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <h1>Board Games</h1>

        <select id="game-select"></select>
        <button id="game-restart">Restart</button>
    </header>

    <main>
        <h1 id="game-name">Board Games</h1>
        <section id="game-info">
            <h2>Welcome!</h2>
        </section>

        <board></board>

        <section id="game-status"></section>

        <details id="game-instructions">
            <summary>Instructions</summary>
            INSTRUCTIONS
        </details>

        <dialog id="confirm-dialog">
            <form method="dialog">
                <p>Confirm?</p>
                <menu>
                    <button value="cancel">Cancel</button>
                    <button value="confirm" autofocus>Confirm</button>
                </menu>
            </form>
        </dialog>
    </main>

    <footer>
        Digital Technologies @ Waimea College
    </footer>
</body>

</html>
